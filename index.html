<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Pie Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            background-color: #f0f0f0;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            max-width: 350px;
        }
        #timerSVG {
            width: 250px;
            height: 250px;
            margin: 0 auto 15px;
        }
        #timerBackground {
            fill: #007bff; /* 기본 채워진 색상 (파란색) */
        }
        #timerPath {
            fill: #f0f0f0; /* 시간이 흐르며 깎여나가는/지워지는 색상 (밝은 회색) */
        }
        /* ✨ 시간 표시 스타일 */
        #timeText {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        /* ✨ ON/OFF 토글 영역 스타일 */
        .toggle-container {
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
            user-select: none;
        }
        .toggle-container input {
            cursor: pointer;
            vertical-align: middle;
            margin-right: 5px;
        }
        .input-container {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        input[type="number"] {
            width: 70px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }
        button {
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        #startButton {
            background-color: #007bff;
        }
        #resetButton {
            background-color: #6c757d;
        }
        button:disabled, input:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <svg id="timerSVG" viewBox="0 0 100 100">
            <circle id="timerBackground" cx="50" cy="50" r="44" />
            <path id="timerPath" d="M50,50 L50,5 A45,45 0 0,1 50,5 Z" />
        </svg>
        
        <div id="timeText">00:00</div>

        <div class="toggle-container">
            <label>
                <input type="checkbox" id="timeToggle" checked onchange="toggleTimeDisplay()"> 
                시간 표시
            </label>
        </div>
        
        <div class="input-container">
            <input type="number" id="minutes" min="1" placeholder="분 입력">
            <button id="startButton" onclick="startTimer()">시작</button>
            <button id="resetButton" onclick="resetTimer()" disabled>리셋</button>
        </div>
    </div>

    <script>
        let totalSeconds = 0;
        let elapsedTime = 0;
        let isRunning = false;
        let lastTimestamp = 0;
        let animationFrameId = null;

        function startTimer() {
            if (isRunning) return;

            const minutesInput = parseInt(document.getElementById('minutes').value) || 0;
            if (minutesInput <= 0) {
                alert('1분 이상의 올바른 시간을 입력해주세요.');
                return;
            }

            totalSeconds = minutesInput * 60;
            elapsedTime = 0;
            isRunning = true;
            lastTimestamp = performance.now();
            
            document.getElementById('startButton').disabled = true;
            document.getElementById('minutes').disabled = true;
            document.getElementById('resetButton').disabled = false;

            requestAnimationFrame(updateTimer);
        }

        function updateTimer(timestamp) {
            if (!isRunning) return;

            const deltaTime = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            elapsedTime += deltaTime / 1000;

            if (elapsedTime >= totalSeconds) {
                elapsedTime = totalSeconds;
                updateTimerDisplay();
                alert("타이머가 종료되었습니다!");
                resetTimer();
                return;
            }

            updateTimerDisplay();
            animationFrameId = requestAnimationFrame(updateTimer);
        }

        function resetTimer() {
            isRunning = false;
            cancelAnimationFrame(animationFrameId);
            
            totalSeconds = 0;
            elapsedTime = 0;

            document.getElementById('startButton').disabled = false;
            document.getElementById('minutes').disabled = false;
            document.getElementById('resetButton').disabled = true;
            document.getElementById('minutes').value = '';
            
            // 시간 텍스트 초기화
            document.getElementById('timeText').textContent = '00:00';
            document.getElementById('timerPath').setAttribute('d', 'M50,50 L50,5 A45,45 0 0,1 50,5 Z');
        }

        function updateTimerDisplay() {
            const timerPath = document.getElementById('timerPath');
            const timeText = document.getElementById('timeText');
            
            const remainingTime = Math.max(0, totalSeconds - elapsedTime);
            const progress = elapsedTime / totalSeconds;
            const angle = progress * 360;
            
            // ✨ 시간 계산 및 텍스트 업데이트
            const minutes = Math.floor(remainingTime / 60);
            const secs = Math.floor(remainingTime % 60);
            timeText.textContent = `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (angle >= 360) {
                timerPath.setAttribute('d', 'M50,50 L50,5 A45,45 0 1,1 49.9,5 Z');
                return;
            }

            const x = 50 + 45 * Math.sin(angle * Math.PI / 180);
            const y = 50 - 45 * Math.cos(angle * Math.PI / 180);
            const largeArcFlag = angle > 180 ? 1 : 0;
            
            timerPath.setAttribute('d', `M50,50 L50,5 A45,45 0 ${largeArcFlag},1 ${x},${y} Z`);
        }

        // ✨ 시간 표시 토글 제어 함수
        function toggleTimeDisplay() {
            const timeText = document.getElementById('timeText');
            const checkbox = document.getElementById('timeToggle');
            
            if (checkbox.checked) {
                timeText.style.display = 'block';
            } else {
                timeText.style.display = 'none';
            }
        }
    </script>
</body>
</html>
